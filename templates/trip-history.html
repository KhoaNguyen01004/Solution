<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip History — Fleet</title>
    <meta name="description" content="View and manage the complete trip history for all fleet vehicles.">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { overflow: hidden; }

        .page-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 28px;
            overflow: hidden;
        }

        /* Table container fills remaining height */
        .table-container {
            flex: 1;
            overflow-y: auto;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        thead tr { background: var(--surface-3); }

        th {
            padding: 11px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 12px 16px;
            color: var(--text-secondary);
            font-size: 13.5px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: rgba(255,255,255,0.025); }

        .actions { display: flex; gap: 6px; }

        .empty-state {
            padding: 56px 32px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Edit modal override — use shared dark modal-content */
        .modal-content {
            max-width: 540px;
            background: var(--surface-2);
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="top-header">
            <div class="header-left">
                <a href="/" class="btn-nav">Back to Map</a>
                <h1>Trip History</h1>
            </div>
            <nav class="header-nav">
                <a href="/locations" class="btn-nav">Locations</a>
                <a href="/manage-trips" class="btn-nav">Trips</a>
                <a href="/oil-change" class="btn-nav">Oil Change</a>
                <button id="clearAllBtn" class="btn-danger">Clear All Trips</button>
            </nav>
        </header>

        <div class="main-content">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Vehicle</th>
                            <th>Driver</th>
                            <th>Pickup</th>
                            <th>Destination</th>
                            <th>Duration</th>
                            <th>Status</th>
                            <th>Queue Order</th>
                            <th>Created At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tripsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Trip Modal -->
    <div id="editTripModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Trip</h2>
                <button id="closeModalBtn" class="modal-close">&#x2715;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="customerName">Customer Name</label>
                    <input type="text" id="customerName">
                </div>
                <div class="form-group">
                    <label for="vehicleName">Vehicle Name</label>
                    <input type="text" id="vehicleName">
                </div>
                <div class="form-group">
                    <label for="pickupName">Pickup Location</label>
                    <input type="text" id="pickupName">
                </div>
                <div class="form-group">
                    <label for="destinationName">Destination</label>
                    <input type="text" id="destinationName">
                </div>
                <div class="form-group">
                    <label for="tripStatus">Status</label>
                    <select id="tripStatus">
                        <option value="queued">Queued</option>
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                        <option value="canceled">Canceled</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="queueOrder">Queue Order</label>
                    <input type="number" id="queueOrder" min="0">
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancelEditBtn" class="btn-nav" style="flex: 1;">Cancel</button>
                <button id="saveTripBtn" class="btn-primary" style="flex: 1;">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="/static/js/utils.js"></script>
    <script src="/static/js/trip-history.js"></script>
</body>
</html>
