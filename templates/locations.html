<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Management — Fleet</title>
    <meta name="description" content="Manage saved locations and geofence zones for the fleet.">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ── Page layout ── */
        .page-main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Left list panel ── */
        .list-panel {
            width: 360px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .list-panel-header {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .list-panel-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .list-panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* ── Search input ── */
        .location-search {
            width: 100%;
            height: 32px;
            padding: 0 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .location-search::placeholder { color: var(--text-secondary); }
        .location-search:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* ── Location item cards ── */
        .location-item {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 12px 14px;
            cursor: pointer;
            transition: border-color var(--transition), background var(--transition);
        }

        .location-item:hover   { border-color: var(--border-hover); }
        .location-item.active  { border-color: var(--accent); background: rgba(47,140,235,0.07); }

        .location-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .location-item-name {
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .location-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .location-actions { display: flex; gap: 6px; }

        /* ── Map panel ── */
        .map-panel {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #location-map { width: 100%; height: 100%; }

        /* ── Edit overlay panel ── */
        .location-edit-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--surface-2);
            border: 1px solid var(--border-hover);
            border-radius: var(--radius-xl);
            padding: 20px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
        }

        .location-edit-panel.hidden { display: none; }

        .location-edit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .location-edit-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .location-edit-input {
            width: 100%;
            padding: 9px 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 13.5px;
            font-family: inherit;
            margin-bottom: 14px;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .location-edit-input::placeholder { color: var(--text-muted); }
        .location-edit-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .location-edit-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        /* ── Autocomplete lists ── */
        .location-autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--surface-2);
            border: 1px solid var(--border-hover);
            border-radius: var(--radius);
            margin-top: 2px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 200;
            box-shadow: var(--shadow);
        }

        .location-autocomplete-list.hidden { display: none; }

        .location-autocomplete-item {
            padding: 9px 12px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            transition: background var(--transition), color var(--transition);
        }

        .location-autocomplete-item:last-child { border-bottom: none; }
        .location-autocomplete-item:hover { background: rgba(47,140,235,0.1); color: var(--text-primary); }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="top-header">
            <div class="header-left">
                <a href="/" class="btn-nav">Back to Map</a>
                <h1>Location Management</h1>
            </div>
            <nav class="header-nav">
                <a href="/manage-trips" class="btn-nav">Trips</a>
                <a href="/trip-history" class="btn-nav">History</a>
                <div class="nav-dropdown" style="position:relative;">
                    <button class="btn-nav" onclick="var d=this.nextElementSibling;d.style.display=d.style.display==='block'?'none':'block'" style="cursor:pointer;background:none;border:none;font-family:inherit;font-size:13px;color:#c9d1d9;font-weight:500;padding:0 14px;height:34px;display:inline-flex;align-items:center;gap:4px;">Fleet &#9662;</button>
                    <div style="display:none;position:absolute;top:100%;right:0;background:#161b22;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:6px;min-width:170px;box-shadow:0 12px 40px rgba(0,0,0,0.5);z-index:200;" class="fleet-dropdown">
                        <a href="/oil-change" class="btn-nav" style="display:flex;width:100%;border-radius:6px;padding:8px 12px;font-size:13px;white-space:nowrap;">Oil Change</a>
                        <a href="/vehicle-management" class="btn-nav" style="display:flex;width:100%;border-radius:6px;padding:8px 12px;font-size:13px;white-space:nowrap;">Vehicles</a>
                        <a href="/fuel-efficiency" class="btn-nav" style="display:flex;width:100%;border-radius:6px;padding:8px 12px;font-size:13px;white-space:nowrap;">Fuel</a>
                        <a href="/fuel-container" class="btn-nav" style="display:flex;width:100%;border-radius:6px;padding:8px 12px;font-size:13px;white-space:nowrap;">Container</a>
                    </div>
                </div>
                <button id="clear-all-locations-btn" class="btn-danger">Clear All Locations</button>
            </nav>
        </header>

        <div class="page-main">
            <!-- Left panel: location list -->
            <div class="list-panel">
                <div class="list-panel-header">
                    <span class="list-panel-title">Saved Locations</span>
                    <div style="position: relative;">
                        <input type="text" id="location-search" class="location-search" placeholder="Search locations...">
                        <div id="location-autocomplete-list" class="location-autocomplete-list hidden"></div>
                    </div>
                    <button id="add-location-btn" class="btn-primary" style="width: 100%;">Add New Location</button>
                </div>
                <div class="list-panel-body" id="location-list"></div>
            </div>

            <!-- Right panel: map -->
            <div class="map-panel">
                <div id="location-map"></div>
                <div id="edit-panel" class="location-edit-panel hidden">
                    <div class="location-edit-header">
                        <h3 id="edit-title">Add New Location</h3>
                        <button id="close-edit-btn" class="btn-nav">Close</button>
                    </div>
                    <p class="hint" style="margin-bottom: 12px;">Click on the map to place corners (at least 3 required)</p>
                    <div style="position: relative;">
                        <input type="text" id="location-name-input" class="location-edit-input" placeholder="Location name">
                        <div id="location-name-autocomplete-list" class="location-autocomplete-list hidden"></div>
                    </div>
                    <div class="location-edit-footer">
                        <button id="clear-corners-btn" class="btn-nav">Clear Corners</button>
                        <button id="cancel-edit-btn" class="btn-nav">Cancel</button>
                        <button id="save-location-btn" class="btn-primary" disabled>Save Location</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/locations.js"></script>
    <script>document.addEventListener('click',e=>{if(!e.target.closest('.nav-dropdown'))document.querySelectorAll('.fleet-dropdown').forEach(d=>d.style.display='none')});</script>
</body>
</html>
