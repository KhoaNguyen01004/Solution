<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Tracking Dashboard</title>
    <meta name="description" content="Real-time fleet vehicle tracking and management dashboard.">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <h2>Loading Vehicle Tracker</h2>
            <div class="loading-progress">
                <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
            </div>
            <p id="loading-text" class="loading-text">Initializing...</p>
        </div>
    </div>

    <div class="app-shell">
        <!-- Top header -->
        <header class="top-header">
            <div class="header-left">
                <button id="toggle-sidebar" class="toggle-sidebar-btn" title="Toggle sidebar">&#9776;</button>
                <h1>Vehicle Tracker</h1>
            </div>

            <div class="header-filters">
                <div class="control-group">
                    <label for="vehicle-search">Search Vehicles</label>
                    <input type="text" id="vehicle-search" placeholder="Plate number...">
                </div>
                <div class="control-group control-group-location">
                    <label for="location-search">Search Locations</label>
                    <div style="display: flex; gap: 6px;">
                        <div class="autocomplete-wrapper" style="flex: 1;">
                            <input type="text" id="location-search" placeholder="Saved locations or address...">
                            <div id="location-autocomplete-list" class="autocomplete-list hidden"></div>
                        </div>
                        <button id="location-pin-btn" class="btn-pin" style="height: 30px; font-size: 12px; padding: 0 10px;">Pin</button>
                    </div>
                </div>
                <div class="checkbox-group control-group">
                    <input type="checkbox" id="has-route-filter">
                    <label for="has-route-filter">With route only</label>
                </div>
            </div>

            <nav class="header-nav">
                <a href="/locations" class="btn-nav">Locations</a>
                <a href="/manage-trips" class="btn-nav">Trips</a>
                <a href="/trip-history" class="btn-nav">History</a>
                <div class="nav-dropdown" style="position:relative;">
                    <button class="btn-nav" onclick="var d=this.nextElementSibling;d.style.display=d.style.display==='block'?'none':'block'" style="cursor:pointer;background:none;border:none;font-family:inherit;font-size:13px;color:#c9d1d9;font-weight:500;padding:0 14px;height:34px;display:inline-flex;align-items:center;gap:4px;">Fleet &#9662;</button>
                    <div style="display:none;position:absolute;top:100%;right:0;background:#161b22;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:6px;min-width:170px;box-shadow:0 12px 40px rgba(0,0,0,0.5);z-index:200;" class="fleet-dropdown">
                        <a href="/oil-change" class="btn-nav" style="display:flex;width:100%;border-radius:6px;padding:8px 12px;font-size:13px;">Oil Change</a>
                        <a href="/vehicle-management" class="btn-nav" style="display:flex;width:100%;border-radius:6px;padding:8px 12px;font-size:13px;">Vehicles</a>
                        <a href="/fuel-efficiency" class="btn-nav" style="display:flex;width:100%;border-radius:6px;padding:8px 12px;font-size:13px;">Fuel</a>
                        <a href="/fuel-container" class="btn-nav" style="display:flex;width:100%;border-radius:6px;padding:8px 12px;font-size:13px;">Container</a>
                    </div>
                </div>
                <button id="refresh-button" type="button" class="btn-primary" style="height: 34px; font-size: 13px;">Refresh</button>
            </nav>
        </header>

        <!-- Sidebar -->
        <aside id="sidebar" class="side-panel">
            <div class="panel-header">
                <button id="toggle-sidebar-top" class="toggle-sidebar-btn" title="Close sidebar">&#x2715;</button>
            </div>
            <section class="panel-card">
                <h2>Vehicle Types</h2>
                <div id="vehicle-types" class="vehicle-type-options"></div>
            </section>
            <section class="panel-card">
                <h2>Vehicle Status</h2>
                <div id="vehicle-statuses" class="vehicle-status-options"></div>
            </section>
            <section class="panel-card">
                <h2>Vehicles in Area (<span id="vehicle-count">0</span>)</h2>
                <div id="vehicle-list" class="vehicle-list-container"></div>
            </section>
            <section class="panel-card">
                <h2>Data Sources</h2>
                <ul id="source-status" class="source-status-list"></ul>
            </section>
        </aside>

        <!-- Map -->
        <main id="map-container">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/map.js"></script>
    <script>document.addEventListener('click',e=>{if(!e.target.closest('.nav-dropdown'))document.querySelectorAll('.fleet-dropdown').forEach(d=>d.style.display='none')});</script>
</body>
</html>
